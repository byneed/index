<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <!-- 모바일에서 화면 크기에 맞게 자동으로 조절되도록 하는 필수 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>byneed coming soon</title>
    <style>
        /* 배경을 검정색으로 하고, 화면 정중앙에 정렬하는 설정 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* 배경 검정색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 화면 세로 꽉 채우기 */
        }

        .landing-img {
            /* PC: 원본 사이즈 그대로 유지 */
            width: auto;
            height: auto;
            
            /* 모바일: 화면이 이미지보다 작아지면 가로 폭에 맞게 자동 축소 */
            max-width: 100%; 
            
            /* 이미지가 너무 흐려지거나 깨지는 걸 방지 */
            display: block; 
        }
    </style>
</head>
<body>

    <!-- 'my-image.jpg' 부분을 실제 업로드할 이미지 파일명(확장자 포함)으로 바꿔주세요! -->
    <img src="soon.jpg" alt="홈페이지 준비중" class="landing-img">

</body>
</html>
